services:
  - type: web
    name: eustdd-calendar
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: eustdd-calendar-db
          property: connectionString

databases:
  - name: eustdd-calendar-db
    plan: free
